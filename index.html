<!DOCTYPE html>
<html>
<head>
<title>ຮ້ານຂອງຂ້ອຍ</title>

<script>
let products = [
  {name:"ສິນຄ້າ A", price:50000, qty:0},
  {name:"ສິນຄ້າ B", price:30000, qty:0},
  {name:"ສິນຄ້າ C", price:20000, qty:0}
];

function changeQty(index, change){
  products[index].qty += change;
  if(products[index].qty < 0) products[index].qty = 0;
  document.getElementById("qty"+index).innerText = products[index].qty;
  updateTotal();
}

function updateTotal(){
  let total = 0;
  let summary = "";
  
  products.forEach(p=>{
    if(p.qty > 0){
      total += p.price * p.qty;
      summary += p.name + " x" + p.qty + ", ";
    }
  });

  document.getElementById("total").innerText = total;
  document.getElementById("amount").value = total;
  document.getElementById("summary").value = summary;
}
</script>

</head>
<body onload="updateTotal()">

<h2>🛒 ເລືອກສິນຄ້າ</h2>

<div>
<h3>ສິນຄ້າ A (50,000 ກີບ)</h3>
<button onclick="changeQty(0,-1)">➖</button>
<span id="qty0">0</span>
<button onclick="changeQty(0,1)">➕</button>
</div>

<div>
<h3>ສິນຄ້າ B (30,000 ກີບ)</h3>
<button onclick="changeQty(1,-1)">➖</button>
<span id="qty1">0</span>
<button onclick="changeQty(1,1)">➕</button>
</div>

<div>
<h3>ສິນຄ້າ C (20,000 ກີບ)</h3>
<button onclick="changeQty(2,-1)">➖</button>
<span id="qty2">0</span>
<button onclick="changeQty(2,1)">➕</button>
</div>

<h2>💰 ລາຄາລວມ: <span id="total">0</span> ກີບ</h2>

<hr>

<img src="PUT_QR_IMAGE_LINK" width="200"><br><br>

<form action="PUT_YOUR_WEBAPP_URL" method="POST">
<input type="text" name="name" placeholder="ຊື່" required><br><br>
<input type="text" name="phone" placeholder="ເບີໂທ" required><br><br>
<input type="text" name="slip" placeholder="ລິ້ງຮູບສະລິບ" required><br><br>

<input type="hidden" name="amount" id="amount">
<input type="hidden" name="summary" id="summary">

<button type="submit">ສົ່ງອໍເດີ</button>
</form>

</body>
  </html>
