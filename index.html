<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ເວັບເຕີມເກມ</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(to right,#1f1c2c,#928dab);
  color:white;
  text-align:center;
}

h1{
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns: repeat(2,1fr);
  gap:15px;
  padding:20px;
}

.card{
  background:#2c2c3c;
  padding:15px;
  border-radius:15px;
}

.card img{
  width:100%;
  border-radius:10px;
}

button{
  margin-top:10px;
  padding:10px;
  width:100%;
  border:none;
  border-radius:8px;
  background:#ff4b2b;
  color:white;
}

.more{
  margin:20px;
  padding:15px;
  background:linear-gradient(to right,#ff416c,#ff4b2b);
  border-radius:25px;
}
</style>
</head>
<body>

<h1>🎮 ເລືອກເກມ</h1>

<div class="grid">

<div class="card">
<img src="freefire.png">
<p>Free Fire</p>
<button>ເຕີມເກມ</button>
</div>

<div class="card">
<img src="mlbb.png">
<p>Mobile Legends</p>
<button>ເຕີມເກມ</button>
</div>

<div class="card">
<img src="rov.png">
<p>RoV</p>
<button>ເຕີມເກມ</button>
</div>

<div class="card">
<img src="roblox.png">
<p>Roblox</p>
<button>ເຕີມເກມ</button>
</div>

</div>

<div class="more">
ເກມອື່ນໆ (More Games)
</div>

</body>
</html>
